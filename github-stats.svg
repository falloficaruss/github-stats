<svg width="495" height="195" viewBox="0 0 495 195" fill="none" xmlns="http://www.w3.org/2000/svg">
      <style>
        .header { font: 600 18px 'Inter', 'Ubuntu', 'Segoe UI', sans-serif; fill: #ff79c6; animation: fadeIn 0.8s ease-in-out forwards; }
        .stat-label { font: 400 14px 'Inter', 'Ubuntu', 'Segoe UI', sans-serif; fill: #f8f8f2; }
        .stat-value { font: 700 14px 'Inter', 'Ubuntu', 'Segoe UI', sans-serif; fill: #f8f8f2; }
        .icon { fill: #bd93f9; }
        .divider { stroke: #44475a; stroke-width: 1px; }
        @keyframes fadeIn {
          0% { opacity: 0; }
          100% { opacity: 1; }
        }
        @keyframes slideIn {
          0% { transform: translateX(-10px); opacity: 0; }
          100% { transform: translateX(0); opacity: 1; }
        }
        .item-1 { animation: slideIn 0.8s ease-in-out 0.2s forwards; opacity: 0; }
        .item-2 { animation: slideIn 0.8s ease-in-out 0.4s forwards; opacity: 0; }
        .item-3 { animation: slideIn 0.8s ease-in-out 0.6s forwards; opacity: 0; }
        .item-4 { animation: slideIn 0.8s ease-in-out 0.8s forwards; opacity: 0; }
      </style>
      
      <!-- Background and Border -->
      <rect x="0.5" y="0.5" rx="8.5" height="194" width="494" fill="#282a36" stroke="#44475a" stroke-width="1"/>
      
      <!-- Header -->
      <text x="25" y="35" class="header">Abhishek Shinde's GitHub Stats</text>
      <line x1="25" y1="45" x2="470" y2="45" class="divider"/>

      <!-- Stats List -->
      <g transform="translate(25, 60)">
        
        <!-- Total Stars -->
        <g transform="translate(0, 0)">
          <g class="item-1">
            <svg x="0" y="0" viewBox="0 0 16 16" width="16" height="16" class="icon">
              <path fill-rule="evenodd" d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z"/>
            </svg>
            <text x="25" y="13" class="stat-label">Total Stars Earned:</text>
            <text x="180" y="13" class="stat-value">1</text>
          </g>
        </g>

        <!-- Total Commits -->
        <g transform="translate(0, 30)">
          <g class="item-2">
            <svg x="0" y="0" viewBox="0 0 16 16" width="16" height="16" class="icon">
              <path fill-rule="evenodd" d="M10.5 7.75a2.5 2.5 0 11-5 0 2.5 2.5 0 015 0zm1.43.75a4.002 4.002 0 01-7.86 0H.75a.75.75 0 110-1.5h3.32a4.001 4.001 0 017.86 0h3.32a.75.75 0 110 1.5h-3.32z"/>
            </svg>
            <text x="25" y="13" class="stat-label">Total Commits:</text>
            <text x="180" y="13" class="stat-value">596</text>
          </g>
        </g>

        <!-- Total PRs -->
        <g transform="translate(0, 60)">
          <g class="item-3">
            <svg x="0" y="0" viewBox="0 0 16 16" width="16" height="16" class="icon">
              <path fill-rule="evenodd" d="M7.177 3.073L9.573.677A.25.25 0 0110 .854v4.792a.25.25 0 01-.427.177L7.177 3.427a.25.25 0 010-.354zM3.75 2.5a.75.75 0 100 1.5.75.75 0 000-1.5zm-2.25.75a2.25 2.25 0 113 2.122v5.256a2.25 2.25 0 11-1.5 0V5.372A2.25 2.25 0 011.5 3.25zM11 2.5h-1V4h1a1.5 1.5 0 011.5 1.5v5.628a2.25 2.25 0 101.5 0V5.5A3 3 0 0011 2.5zm1 10.25a.75.75 0 111.5 0 .75.75 0 01-1.5 0zM3.75 12a.75.75 0 100 1.5.75.75 0 000-1.5z"/>
            </svg>
            <text x="25" y="13" class="stat-label">Total Pull Requests:</text>
            <text x="180" y="13" class="stat-value">67</text>
          </g>
        </g>

        <!-- Total Issues -->
        <g transform="translate(0, 90)">
          <g class="item-4">
            <svg x="0" y="0" viewBox="0 0 16 16" width="16" height="16" class="icon">
              <path fill-rule="evenodd" d="M8 1.5a6.5 6.5 0 100 13 6.5 6.5 0 000-13zM0 8a8 8 0 1116 0A8 8 0 010 8zm9 3a1 1 0 11-2 0 1 1 0 012 0zm-.25-6.25a.75.75 0 00-1.5 0v3.5a.75.75 0 001.5 0v-3.5z"/>
            </svg>
            <text x="25" y="13" class="stat-label">Total Issues:</text>
            <text x="180" y="13" class="stat-value">34</text>
          </g>
        </g>
        
      </g>
    </svg>
  